# SearxNG configuration for the Ollama search agent.
#
# `use_default_settings: true` means we INHERIT SearxNG's full default config
# and only override the few keys below — so this file stays tiny and won't break
# when SearxNG updates its defaults.
use_default_settings: true

server:
  # Change this to any random string in production. Required by SearxNG.
  secret_key: "change_me_to_a_random_secret_key"
  # Disable the bot/rate limiter so local programmatic JSON requests aren't blocked.
  limiter: false
  image_proxy: true

search:
  # THIS is the important bit: enable the JSON API alongside the normal HTML UI.
  # Without "json" here, GET /search?format=json returns HTTP 403.
  formats:
    - html
    - json

# A slightly higher default timeout helps when aggregating many engines.
outgoing:
  request_timeout: 6.0
